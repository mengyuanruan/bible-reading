    <title>Bible Reading Checklist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        
        .header h1 {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 0;
        }
        
        .date-info {
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .jump-section {
            background: #f8f9fa;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .jump-label {
            font-weight: 600;
            color: #2c3e50;
            min-width: 50px;
            font-size: 14px;
        }
        
        .jump-select {
            flex: 1;
            min-width: 200px;
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: white;
        }
        
        .jump-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        
        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 0.3rem;
        }
        
        .nav {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 8px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #ecf0f1;
            border-color: #667eea;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .reading-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 1rem;
        }
        
        .reading-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .reading-item:hover {
            background: #ecf0f1;
        }
        
        .reading-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .reading-item.completed {
            background: #d5f4e6;
            opacity: 0.7;
        }
        
        .reading-item.completed .text {
            text-decoration: line-through;
            color: #7f8c8d;
        }
        
        .text {
            flex: 1;
            font-size: 14px;
        }
        
        .btn-video {
            padding: 6px 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        
        .btn-video:hover {
            background: #c0392b;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn-reset {
            background: #95a5a6;
        }
        
        .btn-reset:hover {
            background: #7f8c8d;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📖 Bible Reading Checklist</h1>
            </div>
            
            <div class="jump-section">
                <label class="jump-label">Jump to:</label>
                <select class="jump-select" id="daySelector" onchange="jumpToDay()">
                    <option value="">Select a day to start...</option>
                </select>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="completedDaysDisplay">0</span>
                    <span class="stat-label">Days Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="overallProgress">0%</span>
                    <span class="stat-label">Progress</span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="nav">
                <button class="nav-btn" id="prevBtn" onclick="goToPreviousDay()">← Previous Day</button>
                <button class="nav-btn" id="nextBtn" onclick="goToNextDay()">Next Day →</button>
            </div>
            
            <div id="weekInfo" style="text-align: center; font-weight: 600; margin-bottom: 1rem; margin-top: 0.8rem; color: #2c3e50; font-size: 16px;"></div>
            
            <div class="reading-list" id="readingList"></div>
            
            <div class="actions">
                <button class="btn" onclick="checkPreviousDays()">✓ Mark Previous Days</button>
                <button class="btn" onclick="downloadProgress()">📥 Export Data</button>
                <button class="btn btn-reset" onclick="resetProgress()">🔄 Reset</button>
            </div>

    </div>

            { week: 34, day: 3, reading: "Isa 14-16; Matt 28", date: "2026-06-17" },
            { week: 34, day: 4, reading: "Isa 17-19; Ps 62; 1 Corinthians 1", date: "2026-06-18" },
            { week: 34, day: 5, reading: "Isa 20-22; 1 Corinthians 2", date: "2026-06-19" },
            { week: 35, day: 1, reading: "Isaiah 23-25; 1 Corinthians 3", date: "2026-06-20" },
            { week: 35, day: 2, reading: "Isa 26-29; Psalm 65; 1 Cor 4", date: "2026-06-21" },
            { week: 35, day: 3, reading: "Isa 30-32; 1 Cor 5", date: "2026-06-22" },
            { week: 35, day: 4, reading: "Isa 33-35; 1 Cor 6", date: "2026-06-23" },
            { week: 35, day: 5, reading: "2 Chr 28; 2 Kings 17; Ps 66; 1 Cor 7", date: "2026-06-24" },
            { week: 36, day: 1, reading: "2 Chr 29-31; 1 Corinthians 8", date: "2026-06-25" }
        ];

        let currentDateIndex = 0;

        function expandChapterRange(reading) {
            const parts = reading.split(/[,;]/).map(s => s.trim());
            const expanded = [];
            
            parts.forEach(part => {
                // 改进的正则：(.+) 贪心匹配书名 + \s+ 要求至少一个空格 + 数字范围
                const match = part.match(/^(.+)\s+(\d+)-(\d+)$/);
                if (match) {
                    const book = match[1].trim();
                    const start = parseInt(match[2]);
                    const end = parseInt(match[3]);
                    for (let i = start; i <= end; i++) {
                        expanded.push(`${book} ${i}`);
                    }
                } else {
                    // 没有范围的就直接加
                    expanded.push(part);
                }
            });
            
            return expanded;
        }

        function populateDaySelector() {
            const selector = document.getElementById('daySelector');
            weekData.forEach((item, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = `Week ${item.week}-${item.day}`;
                selector.appendChild(option);
            });
        }

        function jumpToDay() {
            const selector = document.getElementById('daySelector');
            if (selector.value !== '') {
                currentDateIndex = parseInt(selector.value);
                render();
            }
        }

        function toggleReading(reading) {
            const key = `day-${currentDateIndex}-${reading}`;
            const isChecked = localStorage.getItem(key) === 'true';
            localStorage.setItem(key, isChecked ? 'false' : 'true');
            render();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const options = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('zh-CN', options);
        }

        function goToPreviousDay() {
            if (currentDateIndex > 0) {
                currentDateIndex--;
                document.getElementById('daySelector').value = currentDateIndex;
                render();
            }
        }

        function goToNextDay() {
            if (currentDateIndex < weekData.length - 1) {
                currentDateIndex++;
                document.getElementById('daySelector').value = currentDateIndex;
                render();
            }
        }

        function goToFirstDay() {
            currentDateIndex = 0;
            document.getElementById('daySelector').value = 0;
            render();
        }

        function getCompletedCount() {
            let count = 0;
            for (let i = 0; i < weekData.length; i++) {
                const dayReadings = expandChapterRange(weekData[i].reading);
                dayReadings.forEach(r => {
                    if (localStorage.getItem(`day-${i}-${r}`) === 'true') {
                        count++;
                    }
                });
            }
            return count;
        }

        function getCompletedDays() {
            let days = 0;
            for (let i = 0; i < weekData.length; i++) {
                const dayReadings = expandChapterRange(weekData[i].reading);
                const allCompleted = dayReadings.every(r => localStorage.getItem(`day-${i}-${r}`) === 'true');
                if (allCompleted) days++;
            }
            return days;
        }

        function getTodayProgress() {
            const dayReadings = expandChapterRange(weekData[currentDateIndex].reading);
            const completed = dayReadings.filter(r => localStorage.getItem(`day-${currentDateIndex}-${r}`) === 'true').length;
            return `${completed}/${dayReadings.length}`;
        }

        function downloadProgress() {
            let csv = 'Date,Week,Day,Reading,Completed\n';
            weekData.forEach((item, idx) => {
                const readings = expandChapterRange(item.reading);
                readings.forEach(reading => {
                    const key = `day-${idx}-${reading}`;
                    const completed = localStorage.getItem(key) === 'true' ? '✓' : '';
                    csv += `"${item.date}","W${item.week}","D${item.day}","${reading}","${completed}"\n`;
                });
            });
            
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv));
            element.setAttribute('download', 'bible_reading_progress.csv');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function resetProgress() {
            if (confirm('Reset all reading records? This cannot be undone.')) {
                for (let i = 0; i < weekData.length; i++) {
                    const dayReadings = expandChapterRange(weekData[i].reading);
                    dayReadings.forEach(r => {
                        localStorage.removeItem(`day-${i}-${r}`);
                    });
                }
                render();
            }
        }

        function checkPreviousDays() {
            if (currentDateIndex === 0) {
                alert('Already at the first day');
                return;
            }
            
            if (confirm(`Mark all ${currentDateIndex} previous days as completed?`)) {
                // 把第 0 天到第 currentDateIndex-1 天的所有经文都标记为完成
                for (let i = 0; i < currentDateIndex; i++) {
                    const dayReadings = expandChapterRange(weekData[i].reading);
                    dayReadings.forEach(r => {
                        localStorage.setItem(`day-${i}-${r}`, 'true');
                    });
                }
                render();
            }
        }

        function render() {
            const data = weekData[currentDateIndex];
            const readings = expandChapterRange(data.reading);
            const completedCount = readings.filter(r => localStorage.getItem(`day-${currentDateIndex}-${r}`) === 'true').length;
            const totalCompleted = getCompletedCount();
            const completedDays = getCompletedDays();
            
            document.getElementById('weekInfo').textContent = `Week ${data.week}-${data.day}`;
            document.getElementById('completedDaysDisplay').textContent = completedDays;
            document.getElementById('overallProgress').textContent = Math.round(completedDays / 260 * 100) + '%';
            document.getElementById('progressFill').style.width = (completedCount / readings.length * 100) + '%';
            
            let readingHTML = '';
            readings.forEach(reading => {
                const key = `day-${currentDateIndex}-${reading}`;
                const isChecked = localStorage.getItem(key) === 'true';
                readingHTML += `
                    <div class="reading-item ${isChecked ? 'completed' : ''}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} onclick="toggleReading('${reading.replace(/'/g, "\\'")}')">
                        <span class="text">${reading}</span>
                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(reading + ' NIV read through the BIBLE with Rel')}" target="_blank" class="btn-video" onclick="event.stopPropagation()">▶</a>
                    </div>
                `;
            });
            document.getElementById('readingList').innerHTML = readingHTML;
            
            document.getElementById('prevBtn').disabled = currentDateIndex === 0;
            document.getElementById('nextBtn').disabled = currentDateIndex === weekData.length - 1;
        }

        // 初始化
        populateDaySelector();
        render();
    </script>
