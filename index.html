<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Expires" content="0">
    <title>Bible Reading Checklist</title>
    <style>
        .language-switcher { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 6px; }
        .lang-btn { padding: 8px 14px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .lang-btn.active { background: #667eea; color: white; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem 1rem; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 1.2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .header { text-align: center; margin-bottom: 1.2rem; }
        .header h1 { font-size: 26px; color: #2c3e50; margin: 0; }
        .jump-section { background: #f8f9fa; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
        .jump-label { font-weight: 600; color: #2c3e50; min-width: 50px; font-size: 14px; }
        .jump-select { flex: 1; min-width: 200px; padding: 8px; border: 2px solid #667eea; border-radius: 6px; font-size: 13px; cursor: pointer; background: white; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.8rem; margin-bottom: 1rem; }
        .stat { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 11px; opacity: 0.9; margin-top: 0.3rem; }
        .progress-bar { width: 100%; height: 6px; background: #ecf0f1; border-radius: 4px; margin-bottom: 0.8rem; overflow: hidden; }
        #progressFill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
        .nav { display: flex; gap: 6px; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .nav-btn { padding: 8px 12px; background: white; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .nav-btn:hover { background: #667eea; color: white; border-color: #667eea; }
        .reading-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
        .reading-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .reading-item:hover { background: #ecf0f1; }
        .reading-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
        .reading-item.completed { background: #d5f4e6; opacity: 0.7; }
        .reading-item.completed .text { text-decoration: line-through; color: #7f8c8d; }
        .text { flex: 1; font-size: 14px; }
        .btn-video { padding: 6px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; transition: background 0.2s; }
        .btn-video:hover { background: #c0392b; }
        .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 8px 14px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
        .btn:hover { background: #5568d3; }
        .btn-reset { background: #95a5a6; }
        .btn-reset:hover { background: #7f8c8d; }
        #weekInfo { text-align: center; font-weight: 600; margin-bottom: 1rem; margin-top: 0.8rem; color: #2c3e50; font-size: 16px; }
        .footer { margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid #ddd; text-align: center; font-size: 11px; color: #7f8c8d; }
        .footer a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" id="engBtn" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" id="chiBtn" onclick="setLanguage('zh')">中文</button>
    </div>
    <div class="container">
        <div class="card">
            <div class="header"><h1>📖 Bible Reading Checklist</h1></div>

                <select class="jump-select" id="daySelector" onchange="jumpToDay()">
                    <option value="">Select a day to start...</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="completedDaysDisplay">0</span>
                    <span class="stat-label" id="completedDaysLabel">Days Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="overallProgress">0%</span>
                    <span class="stat-label" id="progressLabel">Progress</span>
                </div>
            </div>
            <div class="progress-bar"><div id="progressFill"></div></div>
            <div class="nav">
                <button class="nav-btn" id="prevBtn" onclick="goToPreviousDay()">← Previous Day</button>
                <button class="nav-btn" id="nextBtn" onclick="goToNextDay()">Next Day →</button>
            </div>
            <div id="weekInfo"></div>
            <div class="reading-list" id="readingList"></div>
            <div class="actions">
                <button class="btn" onclick="checkPreviousDays()">✓ Mark Previous Days</button>
                <button class="btn" onclick="downloadProgress()">📥 Export Data</button>
                <button class="btn btn-reset" onclick="resetProgress()">🔄 Reset</button>
            </div>
            <div class="footer">
                Reference: <a href="https://www.fivedaybiblereading.com/wp-content/uploads/2024/12/2025-5-Day-Bible-Reading_BnW.pdf" target="_blank">Five Day Bible Reading Plan</a>
            </div>
        </div>
    </div>
    <script>
        let language = 'en';
        let currentDateIndex = 0;
        const texts = {

            zh: { jumpTo: '跳到:', selectDay: '选择要开始的日期...', daysCompleted: '完成天数', progress: '今年进度', previousDay: '← 上一天', nextDay: '下一天 →', markPrevious: '✓ 一键打卡前面的', exportData: '📥 导出数据', reset: '🔄 重置', confirmPrevious: (count) => `确定要打卡前面 ${count} 天的所有经文吗？`, alreadyFirst: '已经是第一天了', resetConfirm: '确定要重置所有打卡记录吗？' }
        };
        const scriptureNames = { 'Genesis': '創世記', 'Gen': '創世記', 'Exodus': '出埃及記', 'Ex': '出埃及記', 'Leviticus': '利未記', 'Lev': '利未記', 'Numbers': '民數記', 'Num': '民數記', 'Deuteronomy': '申命記', 'Deut': '申命記', '1 Samuel': '撒母耳記上', '1 Sam': '撒母耳記上', '2 Samuel': '撒母耳記下', '2 Sam': '撒母耳記下', '1 Kings': '列王紀上', '1 Ki': '列王紀上', '1 Kgs': '列王紀上', '2 Kings': '列王紀下', '2 Ki': '列王紀下', '2 Kgs': '列王紀下', '1 Chronicles': '歷代志上', '1 Chr': '歷代志上', '2 Chronicles': '歷代志下', '2 Chr': '歷代志下', 'Ezra': '以斯拉記', 'Ezr': '以斯拉記', 'Nehemiah': '尼希米記', 'Neh': '尼希米記', 'Esther': '以斯帖記', 'Est': '以斯帖記', 'Job': '約伯記', 'Psalm': '詩篇', 'Ps': '詩篇', 'Proverbs': '箴言', 'Prov': '箴言', 'Ecclesiastes': '傳道書', 'Eccl': '傳道書', 'Song of Solomon': '雅歌', 'Song': '雅歌', 'Isaiah': '以賽亞書', 'Isa': '以賽亞書', 'Jeremiah': '耶利米書', 'Jer': '耶利米書', 'Lamentations': '耶利米哀歌', 'Lam': '耶利米哀歌', 'Ezekiel': '以西結書', 'Eze': '以西結書', 'Daniel': '但以理書', 'Dan': '但以理書', 'Hosea': '何西亞書', 'Hos': '何西亞書', 'Joel': '約珥書', 'Amos': '阿摩司書', 'Obadiah': '俄巴底亞書', 'Oba': '俄巴底亞書', 'Jonah': '約拿書', 'Micah': '彌迦書', 'Mic': '彌迦書', 'Nahum': '那鴻書', 'Nah': '那鴻書', 'Habakkuk': '哈巴谷書', 'Hab': '哈巴谷書', 'Zephaniah': '西番雅書', 'Zep': '西番雅書', 'Haggai': '哈該書', 'Hag': '哈該書', 'Zechariah': '撒迦利亞書', 'Zec': '撒迦利亞書', 'Malachi': '瑪拉基書', 'Mal': '瑪拉基書', 'Matthew': '馬太福音', 'Mt': '馬太福音', 'Mark': '馬可福音', 'Mk': '馬可福音', 'Luke': '路加福音', 'Lk': '路加福音', 'John': '約翰福音', 'Jn': '約翰福音', 'Acts': '使徒行傳', 'Act': '使徒行傳', 'Romans': '羅馬書', 'Rom': '羅馬書', '1 Corinthians': '哥林多前書', '1 Cor': '哥林多前書', '2 Corinthians': '哥林多後書', '2 Cor': '哥林多後書', 'Galatians': '加拉太書', 'Gal': '加拉太書', 'Ephesians': '以弗所書', 'Eph': '以弗所書', 'Philippians': '腓立比書', 'Phil': '腓立比書', 'Colossians': '歌羅西書', 'Col': '歌羅西書', '1 Thessalonians': '帖撒羅尼迦前書', '1 Th': '帖撒羅尼迦前書', '1 Thess': '帖撒羅尼迦前書', '2 Thessalonians': '帖撒羅尼迦後書', '2 Th': '帖撒羅尼迦後書', '2 Thess': '帖撒羅尼迦後書', '1 Timothy': '提摩太前書', '1 Ti': '提摩太前書', '1 Tim': '提摩太前書', '2 Timothy': '提摩太後書', '2 Ti': '提摩太後書', '2 Tim': '提摩太後書', 'Titus': '提多書', 'Tit': '提多書', 'Philemon': '腓利門書', 'Phm': '腓利門書', 'Hebrews': '希伯來書', '         function getText(key) { return texts[language][key]; }
        function setLanguage(lang) { language = lang; localStorage.setItem('bibleReadingLanguage', lang); document.getElementById('engBtn').classList.toggle('active', lang === 'en'); document.getElementById('chiBtn').classList.toggle('active', lang === 'zh'); updateUIText(); render(); }
        function convertScriptureToZh(reading) { if (language !== 'zh') return reading; let result = reading; const sortedNames = Object.keys(scriptureNames).sort((a, b) => b.length - a.length); sortedNames.forEach(eng => { const regex = new RegExp('\\b' + eng.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g'); result = result.replace(regex, scriptureNames[eng]); }); return result; }

        function updateUIText() { if (document.getElementById('jumpLabel')) document.getElementById('jumpLabel').textContent = getText('jumpTo'); if (document.getElementById('daySelector') && document.getElementById('daySelector').options[0]) document.getElementById('daySelector').options[0].text = getText('selectDay'); if (document.getElementById('completedDaysLabel')) document.getElementById('completedDaysLabel').textContent = getText('daysCompleted'); if (document.getElementById('progressLabel')) document.getElementById('progressLabel').textContent = getText('progress'); if (document.getElementById('prevBtn')) document.getElementById('prevBtn').textContent = getText('previousDay'); if (document.getElementById('nextBtn')) document.getElementById('nextBtn').textContent = getText('nextDay'); }
        function expandChapterRange(reading) { const parts = reading.split(/[,;]/).map(s => s.trim()); const expanded = []; parts.forEach(part => { const match = part.match(/^(.+)\s+(\d+)-(\d+)$/); if (match) { const [, book, start, end] = match; for (let i = parseInt(start); i <= parseInt(end); i++) expanded.push(`${book} ${i}`); } else { expanded.push(part); } }); return expanded; }

        function resetProgress() { if (confirm(getText('resetConfirm'))) { for (let i = 0; i < weekData.length; i++) { const dayReadings = expandChapterRange(weekData[i].reading); dayReadings.forEach(r => { localStorage.removeItem(`day-${i}-${r}`); }); } render(); } }
